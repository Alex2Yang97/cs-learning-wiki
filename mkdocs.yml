site_name: CS Learning Wiki
site_description: A personal knowledge base on Python, System Design, AWS, AI Agents, and more.
site_url: https://Alex2Yang97.github.io/cs-learning-wiki/
repo_url: https://github.com/Alex2Yang97/cs-learning-wiki
repo_name: Alex2Yang97/cs-learning-wiki

theme:
  name: material
  features:
    - navigation.instant     # SPA-style fast page loads
    - navigation.tracking    # URL updates with the active anchor
    - navigation.top         # back-to-top button
    - navigation.footer      # prev/next links
    - navigation.indexes     # a section's index.md becomes its landing page
    - navigation.sections    # render top-level topics as grouped sections
    - search.suggest         # autocomplete in search
    - search.highlight       # highlight matches on the page
    - content.code.copy      # copy button on code blocks
    - toc.follow
  palette:
    # Light/dark toggle.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition              # note/warning/tip callout boxes
  - attr_list               # needed for grid cards / button styling
  - md_in_html              # needed for grid cards
  - pymdownx.details        # collapsible callouts
  - pymdownx.emoji:         # :material-xxx: icon shortcodes
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true       # clickable header anchors
  # superfences powers both nested code blocks and Mermaid diagrams
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - tags                     # tag index is rendered wherever the
                             # <!-- material/tags --> marker appears (docs/tags.md)

# Sidebar navigation.
# To add a NEW ARTICLE: create the .md file under the topic folder, then add a
#   "  - Title: <folder>/<file>.md" line under that topic below.
# To add a NEW TOPIC: create docs/<new-topic>/index.md, then add a new top-level
#   section here mirroring the ones below.
nav:
  - Home: index.md
  - Python Fundamentals:
      - python-fundamentals/index.md
      - Variables and Types: python-fundamentals/variables-and-types.md
  - System Design:
      - system-design/index.md
  - AWS:
      - aws/index.md
  - AI Agent:
      - ai-agent/index.md
  - Tags: tags.md
